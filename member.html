<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가영일 바디캘린더</title>
<link rel="stylesheet" href="css/style.css?v=20260708-member-effort-select">
</head>
<body>
<div id="loading" class="loading-overlay"><div class="spinner"></div><div class="loading-text">데이터 불러오는 중...</div></div>
<div class="member-layout" id="app" style="display:none">

  <!-- HEADER -->
  <div class="member-header">
    <div class="member-header-info">
      <h1 id="header-name">안녕하세요!</h1>
      <p id="header-sub">오늘도 화이팅하세요 💪</p>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="logout()" style="color:#fff;border-color:rgba(255,255,255,0.3)">로그아웃</button>
  </div>

  <!-- NOTICE BANNER -->
  <div id="notice-banner"></div>

  <!-- STATS BAR -->
  <div style="background:#fff;border-bottom:1px solid var(--border);padding:0 20px">
    <div style="max-width:700px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);text-align:center;padding:12px 0">
      <div>
        <div style="font-size:1.3rem;font-weight:800;color:var(--primary)" id="stat-total">0</div>
        <div style="font-size:0.7rem;color:var(--text-2)">총 세션</div>
      </div>
      <div>
        <div style="font-size:1.3rem;font-weight:800;color:var(--orange)" id="stat-month">0</div>
        <div style="font-size:0.7rem;color:var(--text-2)">이번달</div>
      </div>
      <div>
        <div style="font-size:1.3rem;font-weight:800;color:var(--green)" id="stat-att">0%</div>
        <div style="font-size:0.7rem;color:var(--text-2)">출석률</div>
      </div>
      <div>
        <div style="font-size:1.3rem;font-weight:800;color:var(--yellow)" id="stat-upcoming">0</div>
        <div style="font-size:0.7rem;color:var(--text-2)">예정</div>
      </div>
      <div>
        <div style="font-size:1.3rem;font-weight:800;color:var(--primary)" id="stat-pt">-</div>
        <div style="font-size:0.7rem;color:var(--text-2)">PT 잔여</div>
      </div>
    </div>
  </div>

  <!-- NAV TABS -->
  <div class="member-nav">
    <div class="member-nav-item active" onclick="switchTab('calendar')">📅 캘린더</div>
    <div class="member-nav-item" onclick="switchTab('sessions')">🏋️ 레슨</div>
    <div class="member-nav-item" onclick="switchTab('programs')">📋 프로그램</div>
    <div class="member-nav-item" onclick="switchTab('personal')">✍️ 개인운동</div>
    <div class="member-nav-item" onclick="switchTab('stats')">📊 통계</div>
    <div class="member-nav-item" onclick="switchTab('profile')">👤 내 정보</div>
  </div>

  <!-- MAIN -->
  <div class="member-main">

    <!-- CALENDAR TAB -->
    <div id="tab-calendar">
      <div class="card mb-4">
        <div class="card-header">
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
            <span class="cal-month" id="cal-month-label"></span>
            <button class="cal-nav-btn" onclick="calNav(1)">›</button>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="goToday()">오늘</button>
        </div>
        <div class="card-body" style="padding:12px">
          <div class="calendar-wrap">
            <div class="cal-grid">
              <div class="cal-day-label">일</div>
              <div class="cal-day-label">월</div>
              <div class="cal-day-label">화</div>
              <div class="cal-day-label">수</div>
              <div class="cal-day-label">목</div>
              <div class="cal-day-label">금</div>
              <div class="cal-day-label">토</div>
            </div>
            <div class="cal-grid" id="cal-body" style="margin-top:1px"></div>
          </div>
          <div class="flex gap-3 mt-2" style="font-size:0.75rem;color:var(--text-2)">
            <span>● <span style="color:var(--primary)">예정</span></span>
            <span>● <span style="color:var(--green)">완료</span></span>
            <span>● <span style="color:var(--text-3)">취소</span></span>
          </div>
        </div>
      </div>

      <!-- SELECTED DATE DETAIL -->
      <div id="date-detail" style="display:none">
        <div class="card">
          <div class="card-header">
            <span class="card-title" id="detail-date-label"></span>
          </div>
          <div class="card-body" id="detail-content"></div>
        </div>
      </div>
    </div>

    <!-- SESSIONS TAB -->
    <div id="tab-sessions" style="display:none">
      <div class="flex items-center justify-between mb-4">
        <h2 style="font-size:1rem;font-weight:700">세션 기록</h2>
        <input class="input" type="month" id="session-month-filter" style="width:145px" onchange="renderSessionsTab()">
      </div>
      <div id="sessions-list"></div>
    </div>

    <!-- PROGRAMS TAB -->
    <div id="tab-programs" style="display:none">
      <div class="flex items-center justify-between mb-4">
        <h2 style="font-size:1rem;font-weight:700">내 프로그램</h2>
      </div>
      <div id="programs-list"></div>
    </div>

    <!-- PERSONAL WORKOUT TAB -->
    <div id="tab-personal" style="display:none">
      <div id="weekly-log-list"></div>
    </div>

    <!-- STATS TAB -->
    <div id="tab-stats" style="display:none">
      <div class="card mb-4">
        <div class="card-header"><span class="card-title">🏆 종목별 최고 무게</span></div>
        <div class="card-body" id="exercise-stats-body" style="min-height:80px"></div>
      </div>
      <div class="card mb-4">
        <div class="card-header">
          <span class="card-title">🎟️ PT 잔여 횟수</span>
        </div>
        <div class="card-body" id="pt-status-body" style="min-height:60px"></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">📅 월별 세션 현황</span></div>
        <div class="card-body" id="monthly-stats-body" style="min-height:80px"></div>
      </div>
    </div>

    <!-- PROFILE TAB -->
    <div id="tab-profile" style="display:none">
      <div class="card mb-4">
        <div class="card-header"><span class="card-title">내 정보</span></div>
        <div class="card-body" id="profile-info"></div>
      </div>
      <div class="card mb-4">
        <div class="card-header"><span class="card-title">🏋️ 1RM 기록</span></div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px">
          <div class="grid-2">
            <div class="input-group">
              <label>스쿼트 1RM</label>
              <input class="input one-rm-input" type="number" id="one-rm-squat" step="0.5" placeholder="스쿼트">
            </div>
            <div class="input-group">
              <label>데드리프트 1RM</label>
              <input class="input one-rm-input" type="number" id="one-rm-deadlift" step="0.5" placeholder="데드리프트">
            </div>
            <div class="input-group">
              <label>벤치프레스 1RM</label>
              <input class="input one-rm-input" type="number" id="one-rm-bench" step="0.5" placeholder="벤치프레스">
            </div>
            <div class="input-group">
              <label>오버헤드프레스 1RM</label>
              <input class="input one-rm-input" type="number" id="one-rm-press" step="0.5" placeholder="오버헤드프레스">
            </div>
          </div>
          <button class="btn btn-primary" onclick="saveOneRms()">1RM 저장</button>
        </div>
      </div>
      <!-- 체중 기록 -->
      <div class="card mb-4">
        <div class="card-header">
          <span class="card-title">⚖️ 체중 기록</span>
          <button class="btn btn-primary btn-sm" onclick="openWeightModal()">+ 기록 추가</button>
        </div>
        <div class="card-body">
          <div id="weight-chart" style="margin-bottom:12px"></div>
          <div id="weight-log-list" style="max-height:200px;overflow-y:auto"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">비밀번호 변경</span></div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px">
          <div class="input-group">
            <label>현재 비밀번호</label>
            <input class="input" type="password" id="cur-pw" placeholder="현재 비밀번호">
          </div>
          <div class="input-group">
            <label>새 비밀번호</label>
            <input class="input" type="password" id="new-pw" placeholder="새 비밀번호">
          </div>
          <div class="input-group">
            <label>새 비밀번호 확인</label>
            <input class="input" type="password" id="new-pw2" placeholder="재입력">
          </div>
          <button class="btn btn-primary" onclick="changePw()">변경하기</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- WEIGHT MODAL -->
<div class="modal-overlay" id="modal-weight">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">체중 기록</span>
      <button class="close-btn" onclick="document.getElementById('modal-weight').classList.remove('active')">✕</button>
    </div>
    <div class="modal-body">
      <div class="input-group">
        <label>날짜</label>
        <input class="input" type="date" id="w-date">
      </div>
      <div class="grid-2">
        <div class="input-group">
          <label>몸무게 (kg) *</label>
          <input class="input" type="number" id="w-weight" placeholder="예: 68.5" step="0.1">
        </div>
        <div class="input-group">
          <label>체지방률 (%)</label>
          <input class="input" type="number" id="w-bodyfat" placeholder="예: 18.5" step="0.1">
        </div>
      </div>
      <div class="input-group">
        <label>골격근량 (kg)</label>
        <input class="input" type="number" id="w-muscle" placeholder="예: 32.0" step="0.1">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-weight').classList.remove('active')">취소</button>
      <button class="btn btn-primary" onclick="saveWeightLog()">저장</button>
    </div>
  </div>
</div>

<!-- SESSION DETAIL MODAL -->
<div class="modal-overlay" id="modal-session">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="session-modal-title">세션 상세</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="session-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">닫기</button>
      <button class="btn btn-primary" id="session-effort-save-btn" onclick="saveSessionEffort()">수행 기록 저장</button>
    </div>
  </div>
</div>

<!-- PERSONAL LOG MODAL -->
<div class="modal-overlay" id="modal-personal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="pl-modal-title">개인 운동 기록</span>
      <button class="close-btn" onclick="closePersonalModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pl-edit-id">
      <div class="grid-2">
        <div class="input-group">
          <label>날짜</label>
          <input class="input" type="date" id="pl-date">
        </div>
        <div class="input-group">
          <label>제목 (선택)</label>
          <input class="input" type="text" id="pl-title" placeholder="예: 하체 데이">
        </div>
      </div>
      <div class="input-group">
        <label>운동 목록</label>
        <div id="pl-exercises" style="display:flex;flex-direction:column;gap:8px;margin-top:4px"></div>
        <button class="btn btn-ghost btn-sm" onclick="addPlExRow()" style="margin-top:8px;align-self:flex-start">+ 운동 추가</button>
      </div>
      <div class="input-group">
        <label>메모</label>
        <textarea class="input" id="pl-note" rows="2" placeholder="오늘의 운동 메모" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePersonalModal()">취소</button>
      <button class="btn btn-primary" onclick="savePersonalLog()">저장</button>
    </div>
  </div>
</div>

<datalist id="exercise-list"></datalist>

<div id="toast"></div>
<script src="js/app-config.js?v=20260708-firebase-sync"></script>
<script src="js/db.js?v=20260710-single-main-rm"></script>
<script>
const MEMBER_PAGE_VERSION = '20260709-member-dual-input';
if (!location.search.includes(MEMBER_PAGE_VERSION)) {
  location.replace(`member.html?v=${MEMBER_PAGE_VERSION}`);
}
if (DB.getRole() !== 'member') { location.href = 'index.html'; }

const memberId = DB.getCurrentMemberId();
const today = new Date();
let calYear = today.getFullYear(), calMonth = today.getMonth() + 1;
let selectedDate = null;
let member = null;
let currentTab = 'calendar';
let memberSyncTimer = null;
let activeSessionDetailId = null;
let feedbackRecognition = null;
let feedbackRecognizing = false;
let memberInlineSaveHoldUntil = 0;
const selectedMemberProgramWeeks = new Map();

DB.init().then(() => {
  member = DB.getMember(memberId);
  if (!member) { DB.logout(); location.href = 'index.html'; return; }
  document.getElementById('header-name').textContent = `안녕하세요, ${member.name}님! 👋`;
  const now = today.toISOString().slice(0,7);
  document.getElementById('session-month-filter').value = now;
  renderStats();
  renderNotices();
  renderCalendar();
  // 운동 종목 datalist 채우기
  document.getElementById('exercise-list').innerHTML = getAllExerciseNames().map(n => `<option value="${n}">`).join('');
  const refreshMember = async () => {
    if (document.querySelector('.modal-overlay.active')) return;
    if (isMemberEffortEditing()) return;
    if (Date.now() < memberInlineSaveHoldUntil) return;
    await DB.init();
    member = DB.getMember(memberId);
    if (!member) { DB.logout(); location.href = 'index.html'; return; }
    document.getElementById('header-name').textContent = `안녕하세요, ${member.name}님! 👋`;
    renderStats();
    renderNotices();
    if (currentTab === 'calendar') {
      if (selectedDate) selectDate(selectedDate);
      else renderCalendar();
    } else if (currentTab === 'sessions') {
      renderSessionsTab();
    } else if (currentTab === 'programs') {
      return;
    } else if (currentTab === 'personal') {
      renderPersonalLogs();
    } else if (currentTab === 'stats') {
      renderStatsTab();
    } else if (currentTab === 'profile') {
      renderProfile();
      renderWeightLog();
    }
    document.getElementById('exercise-list').innerHTML = getAllExerciseNames().map(n => `<option value="${n}">`).join('');
  };
  clearInterval(memberSyncTimer);
  memberSyncTimer = setInterval(() => refreshMember().catch(() => {}), 5000);
  window.addEventListener('focus', () => refreshMember().catch(() => {}));
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) refreshMember().catch(() => {});
  });
  document.addEventListener('focusin', e => {
    if (e.target && e.target.matches && e.target.matches('.member-program-effort select, .member-program-effort input, .exercise-item select, .exercise-item input, .member-set-done, .program-set-done')) {
      memberInlineSaveHoldUntil = Date.now() + 15000;
    }
  });
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = '';
}).catch(e => {
  console.error(e);
  document.getElementById('loading').innerHTML = `<div class="loading-text" style="color:var(--red);font-weight:700">데이터 불러오기 실패</div><div class="loading-text" style="font-size:0.75rem;max-width:280px;text-align:center;word-break:break-all">${e && e.message ? e.message : String(e)}</div>`;
});

function isMemberEffortEditing() {
  const active = document.activeElement;
  if (!active) return false;
  return !!active.closest('.member-program-effort') ||
    active.classList?.contains('program-set-reps') ||
    active.classList?.contains('program-set-rpe') ||
    active.classList?.contains('program-set-weight') ||
    active.classList?.contains('program-set-reps-input') ||
    active.classList?.contains('program-set-weight-input') ||
    active.classList?.contains('member-set-reps') ||
    active.classList?.contains('member-set-rpe') ||
    active.classList?.contains('member-set-weight') ||
    active.classList?.contains('member-set-reps-input') ||
    active.classList?.contains('member-set-weight-input');
}

function renderStats() {
  const stats = DB.getMemberStats(memberId);
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-month').textContent = stats.thisMonth;
  document.getElementById('stat-att').textContent = stats.attendance + '%';
  document.getElementById('stat-upcoming').textContent = stats.upcomingCount;
  const pt = DB.getPtRemaining(memberId);
  document.getElementById('stat-pt').textContent = pt ? pt.remaining + '회' : '-';
}

function renderNotices() {
  const notices = DB.getNotices();
  const banner = document.getElementById('notice-banner');
  if (!notices.length) { banner.innerHTML = ''; return; }
  const sorted = [...notices].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || b.date.localeCompare(a.date));
  banner.innerHTML = sorted.slice(0,3).map(n => `
    <div style="background:${n.pinned?'var(--primary-light)':'#FFF9EC'};border-bottom:1px solid ${n.pinned?'var(--primary)':'var(--yellow)'};padding:10px 20px;display:flex;align-items:flex-start;gap:10px">
      <span style="font-size:1rem">${n.pinned?'📌':'📢'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:0.875rem;color:${n.pinned?'var(--primary)':'var(--text)'}">${n.title}</div>
        <div style="font-size:0.8rem;color:var(--text-2);margin-top:2px;white-space:pre-wrap">${n.content}</div>
      </div>
      <div style="font-size:0.7rem;color:var(--text-3);white-space:nowrap">${n.date}</div>
    </div>`).join('');
}

// ===== TABS =====
function switchTab(name) {
  currentTab = name;
  ['calendar','sessions','programs','personal','stats','profile'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.member-nav-item').forEach((el, i) => {
    el.classList.toggle('active', (['calendar','sessions','programs','personal','stats','profile'][i]) === name);
  });
  if (name === 'sessions') renderSessionsTab();
  if (name === 'programs') renderProgramsTab();
  if (name === 'personal') renderPersonalLogs();
  if (name === 'stats') renderStatsTab();
  if (name === 'profile') { renderProfile(); renderWeightLog(); }
}

// ===== CALENDAR =====
function calNav(dir) {
  calMonth += dir;
  if (calMonth > 12) { calMonth = 1; calYear++; }
  if (calMonth < 1) { calMonth = 12; calYear--; }
  renderCalendar();
  selectedDate = null;
  document.getElementById('date-detail').style.display = 'none';
}

function goToday() {
  calYear = today.getFullYear();
  calMonth = today.getMonth() + 1;
  renderCalendar();
  selectDate(today.toISOString().split('T')[0]);
}

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${calYear}년 ${calMonth}월`;
  const schedules = DB.getMemberSchedules(memberId).filter(s => s.date.startsWith(`${calYear}-${String(calMonth).padStart(2,'0')}`));
  const sessions = DB.getMemberSessions(memberId).filter(s => s.date.startsWith(`${calYear}-${String(calMonth).padStart(2,'0')}`));

  const firstDay = new Date(calYear, calMonth-1, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const prevDays = new Date(calYear, calMonth-1, 0).getDate();
  const todayStr = today.toISOString().split('T')[0];

  let cells = '';
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    let day, dateStr, isOther = false;
    if (i < firstDay) { day = prevDays - firstDay + i + 1; const d = new Date(calYear, calMonth-2, day); dateStr = d.toISOString().split('T')[0]; isOther = true; }
    else if (i >= firstDay + daysInMonth) { day = i - firstDay - daysInMonth + 1; const d = new Date(calYear, calMonth, day); dateStr = d.toISOString().split('T')[0]; isOther = true; }
    else { day = i - firstDay + 1; dateStr = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`; }

    const daySch = schedules.filter(s => s.date === dateStr);
    const daySes = sessions.filter(s => s.date === dateStr);
    const isToday = dateStr === todayStr;
    const isSel = dateStr === selectedDate;

    // Text labels
    let indicators = '';
    if (daySes.length > 0) {
      indicators = daySes.map(s => {
        const exNames = (s.exercises||[]).map(e => e.name).join('·');
        const label = exNames ? exNames.substring(0, 10) + (exNames.length > 10 ? '..' : '') : '운동 완료';
        return `<div class="cal-event ${s.attendance===false?'cal-event-cancelled':'cal-event-completed'}">${s.attendance===false?'결석':label}</div>`;
      }).join('');
    } else if (daySch.length > 0) {
      indicators = daySch.map(s =>
        `<div class="cal-event cal-event-${s.status}">PT${s.time?' '+s.time:''}</div>`
      ).join('');
    }

    cells += `<div class="cal-cell ${isOther?'other-month':''} ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectDate('${dateStr}')">
      <div class="cal-date">${day}</div>
      ${indicators}
    </div>`;
  }
  document.getElementById('cal-body').innerHTML = cells;
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  const detailEl = document.getElementById('date-detail');
  const contentEl = document.getElementById('detail-content');
  const labelEl = document.getElementById('detail-date-label');

  detailEl.style.display = '';
  labelEl.textContent = formatDate(dateStr);

  const schedules = DB.getMemberSchedules(memberId).filter(s => s.date === dateStr);
  const sessions = DB.getMemberSessions(memberId).filter(s => s.date === dateStr);

  let html = '';

  if (schedules.length > 0) {
    html += '<div class="section-title">일정</div>';
    html += schedules.map(s => `
      <div style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:50%;background:${s.status==='completed'?'var(--green-light)':s.status==='cancelled'?'var(--bg)':'var(--primary-light)'};display:flex;align-items:center;justify-content:center;font-size:1.1rem">${s.status==='completed'?'✅':s.status==='cancelled'?'❌':'🏋️'}</div>
        <div>
          <div style="font-weight:600;font-size:0.9rem">PT 세션${s.time?' · '+s.time:''}</div>
          <div style="font-size:0.78rem;color:var(--text-2)">${s.memo||''}</div>
        </div>
        ${statusBadge(s.status)}
      </div>`).join('');
  }

  if (sessions.length > 0) {
    html += `<div class="section-title" style="${schedules.length?'margin-top:12px':''}">세션 기록</div>`;
    html += sessions.map(s => `
      <div style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer" onclick="showSessionDetail('${s.id}')">
        <div class="flex items-center justify-between mb-3">
          <div style="font-weight:600">💪 운동 ${s.exercises?.length||0}종목</div>
          <span class="badge ${s.attendance===false?'badge-red':'badge-green'}">${s.attendance===false?'결석':'출석'}</span>
        </div>
        ${s.exercises?.length>0?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${s.exercises.map(e=>`<span class="badge badge-purple">${e.name}</span>`).join('')}</div>`:''}
        ${s.trainerNote?`<div style="font-size:0.8rem;color:var(--text-2);background:#fff;border-radius:6px;padding:8px">📝 ${s.trainerNote}</div>`:''}
        <div style="font-size:0.75rem;color:var(--primary);margin-top:6px">탭하여 상세보기 →</div>
      </div>`).join('');
  }

  if (!schedules.length && !sessions.length) {
    html = '<div class="empty" style="padding:24px 0"><div class="empty-icon">😴</div><div class="empty-text">이 날은 일정이 없습니다</div></div>';
  }

  contentEl.innerHTML = html;
  detailEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===== SESSIONS TAB =====
function renderSessionsTab() {
  const month = document.getElementById('session-month-filter').value;
  let sessions = DB.getMemberSessions(memberId);
  if (month) sessions = sessions.filter(s => s.date.startsWith(month));

  const el = document.getElementById('sessions-list');
  if (sessions.length === 0) {
    el.innerHTML = '<div class="empty" style="padding:48px 0"><div class="empty-icon">💪</div><div class="empty-text">이 기간에 세션 기록이 없습니다</div></div>';
    return;
  }

  // Group by week
  const grouped = {};
  sessions.forEach(s => {
    const d = new Date(s.date + 'T00:00:00');
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    const key = weekStart.toISOString().split('T')[0];
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(s);
  });

  el.innerHTML = Object.entries(grouped).sort((a,b) => b[0].localeCompare(a[0])).map(([weekStart, weekSessions]) => {
    const weekEnd = new Date(weekStart + 'T00:00:00');
    weekEnd.setDate(weekEnd.getDate() + 6);
    return `
      <div style="margin-bottom:20px">
        <div style="font-size:0.75rem;font-weight:700;color:var(--text-2);margin-bottom:8px;padding:0 4px">${new Date(weekStart+'T00:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric'})} ~ ${weekEnd.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})}</div>
        ${weekSessions.map(s => `
          <div class="session-card mb-3" onclick="showSessionDetail('${s.id}')" style="cursor:pointer">
            <div class="session-card-header">
              <div style="flex:1">
                <div style="font-weight:700;font-size:0.9rem">${formatDate(s.date)}</div>
                <div style="font-size:0.78rem;color:var(--text-2)">${s.startTime||''} ${s.exercises?.length||0}종목</div>
              </div>
              <span class="badge ${s.attendance===false?'badge-red':'badge-green'}">${s.attendance===false?'결석':'출석'}</span>
            </div>
            <div class="session-card-body">
              ${s.exercises?.length>0?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">${s.exercises.map(e=>`<span class="badge badge-purple">${e.name} ${e.sets?.length||0}세트</span>`).join('')}</div>`:''}
              ${s.trainerNote?`<div style="font-size:0.82rem;color:var(--text-2);background:var(--primary-light);border-radius:6px;padding:8px;border-left:3px solid var(--primary)">
                <div style="font-size:0.7rem;font-weight:700;color:var(--primary);margin-bottom:2px">트레이너 피드백</div>
                ${s.trainerNote}
              </div>`:''}
              ${s.nextPlan?`<div style="font-size:0.82rem;color:var(--text-2);background:var(--orange-light);border-radius:6px;padding:8px;border-left:3px solid var(--orange);margin-top:6px">
                <div style="font-size:0.7rem;font-weight:700;color:var(--orange);margin-bottom:2px">다음 세션</div>
                ${s.nextPlan}
              </div>`:''}
            </div>
          </div>`).join('')}
      </div>`;
  }).join('');
}

// ===== PROGRAMS TAB =====
function renderProgramsTab() {
  const routines = DB.getRoutines().filter(r => r.memberId === memberId && r.programId);
  const el = document.getElementById('programs-list');
  if (!el) return;
  if (routines.length === 0) {
    el.innerHTML = '<div class="empty" style="padding:48px 0"><div class="empty-icon">📋</div><div class="empty-text">저장된 프로그램이 없습니다<br>트레이너가 프로그램을 저장하면 여기에 표시됩니다</div></div>';
    return;
  }

  const programs = [];
  const map = new Map();
  routines.forEach(r => {
    if (!map.has(r.programId)) {
      map.set(r.programId, {
        id: r.programId,
        title: r.programTitle || '운동 프로그램',
        summary: r.programSummary || '',
        weeklyPlan: r.programWeeklyPlan || r.weeklyPlan || [],
        routines: []
      });
      programs.push(map.get(r.programId));
    }
    map.get(r.programId).routines.push(r);
  });

  el.innerHTML = programs.map(program => `
    <div class="card mb-4">
      <div class="card-header">
        <div>
          <span class="card-title">${program.title}</span>
          <div style="font-size:0.78rem;color:var(--text-2);margin-top:4px">${program.summary} · ${program.routines.length}개 루틴</div>
        </div>
      </div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:12px">
        ${program.weeklyPlan?.length ? `
          <div>
            <div style="font-size:0.82rem;font-weight:800;margin-bottom:8px">주차별 강도</div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px">
              ${program.weeklyPlan.map(w=>`<button type="button" onclick="selectMemberProgramWeek('${program.id}', ${w.week})" style="text-align:left;border:1.5px solid ${(selectedMemberProgramWeeks.get(program.id)||1)===w.week?'var(--primary)':'var(--border)'};border-radius:8px;padding:8px;background:${(selectedMemberProgramWeeks.get(program.id)||1)===w.week?'var(--primary-light)':'var(--bg)'};cursor:pointer">
                <div style="font-size:0.78rem;font-weight:800">${w.week}주차 · ${w.focus}</div>
                <div style="font-size:0.72rem;color:var(--text-2)">진행강도 ${w.delta>0?'+':''}${w.delta}% · ${w.rpe}</div>
                <div style="font-size:0.72rem;color:var(--text-2)">${w.volume}</div>
              </button>`).join('')}
            </div>
          </div>` : ''}
        ${program.routines.map(r => `
          <details open style="border:1.5px solid var(--border);border-radius:8px;padding:12px;background:#fff">
            <summary style="cursor:pointer;font-weight:800">${r.name} <span class="badge badge-purple">${r.exercises?.length||0}종목</span></summary>
            <div style="font-size:0.76rem;color:var(--text-2);margin:8px 0">${r.description||''}</div>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${(r.exercises||[]).map(e=>`
                <div style="border:1px solid var(--border);border-radius:8px;padding:10px;background:var(--bg)">
                  <div style="font-weight:800;font-size:0.86rem;margin-bottom:6px">${getMemberExerciseDisplayName(e, selectedMemberProgramWeeks.get(program.id)||1)}</div>
                  ${renderMemberSelectedWeekLoad(e, selectedMemberProgramWeeks.get(program.id)||1)}
                  <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">
                    ${renderMemberProgramSets(e, selectedMemberProgramWeeks.get(program.id)||1)}
                  </div>
                  ${renderMemberProgramSetChecks(r.id, e, r.exercises.indexOf(e), selectedMemberProgramWeeks.get(program.id)||1)}
                  ${e.weeklyLoads?.length ? `<div style="font-size:0.74rem;color:var(--text-2);margin-bottom:6px">${e.weeklyLoads.map(w=>`${w.week}주 ${w.percent?`${w.percent}%`:w.rpe}${w.weight?`/${w.weight}kg`:''}`).join(' · ')}</div>` : ''}
                  ${e.note?`<div style="font-size:0.74rem;color:var(--text-2)">${e.note}</div>`:''}
                </div>`).join('')}
            </div>
            <button class="btn btn-primary btn-sm" onclick="saveProgramRoutineEffort('${r.id}', ${selectedMemberProgramWeeks.get(program.id)||1})">수행 체크 저장</button>
          </details>`).join('')}
      </div>
    </div>`).join('');
}

function selectMemberProgramWeek(programId, week) {
  selectedMemberProgramWeeks.set(programId, week);
  renderProgramsTab();
}

function renderMemberSelectedWeekLoad(exercise, week) {
  const load = (exercise.weeklyLoads || []).find(w => w.week === week);
  if (!load) return '';
  return `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">
    <span class="badge badge-orange">${week}주차</span>
    ${load.exerciseName && load.exerciseName !== exercise.name ? `<span class="badge badge-green">${load.exerciseName}</span>` : ''}
    ${load.focus?`<span class="badge badge-purple">${load.focus}</span>`:''}
    ${load.percent?`<span class="badge badge-green">${load.percent}% 1RM</span>`:''}
    ${load.reps?`<span class="badge badge-orange">${load.reps}회</span>`:''}
    ${load.weight?`<span class="badge badge-orange">${load.weight}kg</span>`:''}
    ${load.rpe?`<span class="badge badge-gray">${load.rpe}</span>`:''}
    ${load.volume?`<span class="badge badge-gray">${load.volume}</span>`:''}
  </div>`;
}

function getMemberExerciseWeekLoad(exercise, week) {
  return (exercise.weeklyLoads || []).find(w => w.week === week) || null;
}

function getMemberExerciseDisplayName(exercise, week) {
  const load = getMemberExerciseWeekLoad(exercise, week);
  return load?.exerciseName || exercise.name;
}

function renderMemberProgramSets(exercise, week) {
  const load = getMemberExerciseWeekLoad(exercise, week);
  return (exercise.sets || []).map(set => {
    const displayWeight = load?.weight || set.weight || '';
    const displayReps = load?.reps || set.reps || '-';
    const suffix = exercise.unit === 'time' ? '초' : 'kg';
    return `<span class="badge badge-gray">${set.set}세트 · ${displayReps}${exercise.unit==='time'?'':'회'}${displayWeight ? ` · ${displayWeight}${suffix}` : ''}${load?.rpe ? ` · ${load.rpe}` : ''}</span>`;
  }).join('');
}

function renderMemberProgramSetChecks(routineId, exercise, exIdx, week) {
  return `<details open style="margin:8px 0;border:1px solid var(--border);border-radius:8px;padding:8px;background:#fff">
    <summary style="cursor:pointer;font-size:0.78rem;font-weight:800">세트별 수행 체크</summary>
    <div style="overflow-x:auto;margin-top:8px">
      <table class="sets-table member-program-effort" data-routine-id="${routineId}" data-exercise-index="${exIdx}">
        <thead><tr><th>완료</th><th>세트</th><th>계획</th><th>실제 횟수</th><th>중량</th><th>RPE</th></tr></thead>
        <tbody>${(exercise.sets||[]).map((set, setIdx) => {
          const effort = set.efforts?.[week] || {};
          return `<tr data-set-index="${setIdx}">
            <td><input type="checkbox" class="program-set-done" ${effort.done?'checked':''} style="width:18px;height:18px;accent-color:var(--primary)"></td>
            <td>${set.set || setIdx + 1}세트</td>
            <td>${formatPlannedReps(getMemberExerciseWeekLoad(exercise, week)?.reps || set.reps)}</td>
            <td>${renderDualInput('program-set-reps', 'program-set-reps-input', effort.actualReps, 'reps')}</td>
            <td>${renderDualInput('program-set-weight', 'program-set-weight-input', effort.actualWeight, 'weight')}</td>
            <td>${renderDualInput('program-set-rpe', 'program-set-rpe-input', effort.rpe, 'rpe')}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  </details>`;
}

function renderDualInput(selectClass, inputClass, value = '', kind = 'reps') {
  const selected = String(value || '');
  const { placeholder, options, inputType, step } = dualInputConfig(kind);
  const selectedValue = options.includes(selected) ? selected : (selected ? '직접 입력' : '');
  const inputVisible = !options.includes(selected) && !!selected;
  return `<div style="display:flex;flex-direction:column;gap:4px;min-width:120px">
    <select class="select ${selectClass}" onchange="toggleDualInput(this)" style="text-align:center;padding:6px">
      ${['', ...options, '직접 입력'].map(opt => `<option value="${opt}" ${selectedValue === opt ? 'selected' : ''}>${opt || placeholder}</option>`).join('')}
    </select>
    <input class="input ${inputClass}" type="${inputType}" value="${inputVisible ? selected : ''}" placeholder="${placeholder}" step="${step || ''}" style="height:32px;display:${selectedValue === '직접 입력' || inputVisible ? '' : 'none'}">
  </div>`;
}

function dualInputConfig(kind) {
  if (kind === 'weight') {
    return {
      placeholder: '중량',
      options: Array.from({ length: 81 }, (_, i) => String((i * 2.5).toFixed(1)).replace(/\.0$/, '')),
      inputType: 'number',
      step: '0.5'
    };
  }
  if (kind === 'rpe') {
    return {
      placeholder: 'RPE',
      options: ['5', '5.5', '6', '6.5', '7', '7.5', '8', '8.5', '9', '9.5', '10'],
      inputType: 'text',
      step: '0.5'
    };
  }
  return {
    placeholder: '횟수',
    options: Array.from({ length: 30 }, (_, i) => String(i + 1)),
    inputType: 'text',
    step: ''
  };
}

function toggleDualInput(selectEl) {
  const wrapper = selectEl.closest('div');
  const input = wrapper?.querySelector('input');
  if (!input) return;
  const show = selectEl.value === '직접 입력';
  input.style.display = show ? '' : 'none';
  if (show) input.focus();
}

function saveProgramRoutineEffort(routineId, week) {
  const routine = DB.getRoutine(routineId);
  if (!routine) return;
  const exercises = (routine.exercises || []).map((exercise, exIdx) => {
    const table = document.querySelector(`.member-program-effort[data-routine-id="${routineId}"][data-exercise-index="${exIdx}"]`);
    const sets = (exercise.sets || []).map((set, setIdx) => {
      const row = table?.querySelector(`tr[data-set-index="${setIdx}"]`);
      const repsSelect = row?.querySelector('.program-set-reps');
      const repsInput = row?.querySelector('.program-set-reps-input');
      const weightSelect = row?.querySelector('.program-set-weight');
      const weightInput = row?.querySelector('.program-set-weight-input');
      const rpeSelect = row?.querySelector('.program-set-rpe');
      const rpeInput = row?.querySelector('.program-set-rpe-input');
      const actualReps = repsSelect?.value === '직접 입력' ? (repsInput?.value?.trim() || '') : (repsSelect?.value?.trim() || '');
      const actualWeight = weightSelect?.value === '직접 입력' ? (weightInput?.value?.trim() || '') : (weightSelect?.value?.trim() || '');
      const actualRpe = rpeSelect?.value === '직접 입력' ? (rpeInput?.value?.trim() || '') : (rpeSelect?.value || '');
      const efforts = { ...(set.efforts || {}) };
      efforts[week] = {
        done: !!row?.querySelector('.program-set-done')?.checked,
        actualReps,
        actualWeight,
        rpe: actualRpe
      };
      return { ...set, efforts };
    });
    return { ...exercise, sets };
  });
  DB.updateRoutine(routineId, { exercises });
  memberInlineSaveHoldUntil = Date.now() + 15000;
  toast(`${week}주차 수행 체크가 저장되었습니다`, 'success');
}

// ===== STATS TAB =====
function renderStatsTab() {
  // 운동 통계
  const exStats = DB.getExerciseStats(memberId);
  const exEl = document.getElementById('exercise-stats-body');
  if (exStats.length === 0) {
    exEl.innerHTML = '<div class="empty" style="padding:20px 0"><div class="empty-text">세션 기록이 없습니다</div></div>';
  } else {
    exEl.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px">
      ${exStats.slice(0,8).map(e => `
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:90px;font-size:0.85rem;font-weight:600;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.name}</div>
          <div style="flex:1">
            <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,e.count*20)}%"></div></div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            ${e.maxWeight>0?`<span class="badge badge-orange">${e.maxWeight}kg</span>`:''}
            <span class="badge badge-gray" style="margin-left:4px">${e.count}회</span>
          </div>
        </div>`).join('')}
    </div>`;
  }

  // PT 현황
  const pt = DB.getPtRemaining(memberId);
  const ptEl = document.getElementById('pt-status-body');
  if (!pt) {
    ptEl.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:12px">등록된 PT 패키지가 없습니다</div>';
  } else {
    const color = pt.remaining <= 3 ? 'var(--yellow)' : 'var(--green)';
    ptEl.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px">
        <div style="text-align:center">
          <div style="font-size:2rem;font-weight:800;color:${color}">${pt.remaining}</div>
          <div style="font-size:0.75rem;color:var(--text-2)">잔여 횟수</div>
        </div>
        <div style="flex:1">
          <div style="font-size:0.8rem;color:var(--text-2);margin-bottom:6px">${pt.used}회 사용 / ${pt.total}회 패키지</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(pt.used/pt.total*100)}%;background:${color}"></div></div>
          ${pt.pkg.expiryDate?`<div style="font-size:0.75rem;color:var(--text-3);margin-top:4px">만료일: ${pt.pkg.expiryDate}</div>`:''}
        </div>
      </div>`;
  }

  // 월별 세션
  const sessions = DB.getMemberSessions(memberId);
  const monthly = {};
  sessions.forEach(s => {
    const key = s.date.slice(0,7);
    if (!monthly[key]) monthly[key] = 0;
    if (s.attendance !== false) monthly[key]++;
  });
  const months = Object.entries(monthly).sort((a,b) => a[0].localeCompare(b[0])).slice(-6);
  const maxVal = Math.max(...months.map(m => m[1]), 1);
  const monthEl = document.getElementById('monthly-stats-body');
  if (months.length === 0) {
    monthEl.innerHTML = '<div class="empty" style="padding:20px 0"><div class="empty-text">데이터가 없습니다</div></div>';
  } else {
    monthEl.innerHTML = `<div style="display:flex;align-items:flex-end;gap:8px;height:100px;padding-bottom:20px;position:relative">
      ${months.map(([m, cnt]) => {
        const h = Math.round((cnt/maxVal)*80);
        const label = m.slice(5) + '월';
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
          <div style="font-size:0.75rem;font-weight:700;color:var(--primary)">${cnt}</div>
          <div style="width:100%;background:var(--primary);border-radius:4px 4px 0 0;height:${h}px;min-height:4px;transition:height 0.3s"></div>
          <div style="font-size:0.7rem;color:var(--text-2)">${label}</div>
        </div>`;
      }).join('')}
    </div>`;
  }
}

// ===== WEIGHT LOG =====
function openWeightModal() {
  document.getElementById('w-date').value = today.toISOString().split('T')[0];
  document.getElementById('w-weight').value = '';
  document.getElementById('w-bodyfat').value = '';
  document.getElementById('w-muscle').value = '';
  document.getElementById('modal-weight').classList.add('active');
}

function saveWeightLog() {
  const weight = parseFloat(document.getElementById('w-weight').value);
  const date = document.getElementById('w-date').value;
  if (!weight || !date) { toast('날짜와 몸무게를 입력하세요', 'error'); return; }
  DB.addWeightLog({
    memberId, date, weight,
    bodyFat: parseFloat(document.getElementById('w-bodyfat').value) || null,
    muscleMass: parseFloat(document.getElementById('w-muscle').value) || null,
  });
  document.getElementById('modal-weight').classList.remove('active');
  toast('체중이 기록되었습니다', 'success');
  renderWeightLog();
  renderStats();
}

function renderWeightLog() {
  const logs = DB.getMemberWeightLogs(memberId);
  const chartEl = document.getElementById('weight-chart');
  const listEl = document.getElementById('weight-log-list');

  if (logs.length === 0) {
    chartEl.innerHTML = '';
    listEl.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:20px;font-size:0.85rem">체중 기록이 없습니다</div>';
    return;
  }

  // SVG 라인 차트
  const recent = logs.slice(-12);
  const weights = recent.map(l => l.weight);
  const minW = Math.min(...weights) - 1;
  const maxW = Math.max(...weights) + 1;
  const W = 600, H = 100;
  const pts = recent.map((l,i) => {
    const x = recent.length === 1 ? W/2 : (i / (recent.length-1)) * (W-40) + 20;
    const y = H - ((l.weight - minW) / (maxW - minW)) * (H-20) - 10;
    return `${x},${y}`;
  });
  chartEl.innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:80px">
    <polyline points="${pts.join(' ')}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linejoin="round"/>
    ${recent.map((l,i) => {
      const [x,y] = pts[i].split(',');
      return `<circle cx="${x}" cy="${y}" r="4" fill="var(--primary)"/>
        <text x="${x}" y="${parseFloat(y)-8}" text-anchor="middle" font-size="9" fill="var(--text-2)">${l.weight}</text>`;
    }).join('')}
  </svg>`;

  // 목록
  listEl.innerHTML = [...logs].reverse().slice(0,10).map(l => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="flex-shrink:0;font-size:0.8rem;color:var(--text-2);width:80px">${l.date}</div>
      <div style="flex:1;font-weight:700">${l.weight}kg</div>
      ${l.bodyFat?`<span class="badge badge-purple">체지방 ${l.bodyFat}%</span>`:''}
      ${l.muscleMass?`<span class="badge badge-green">근육 ${l.muscleMass}kg</span>`:''}
      <button class="btn btn-ghost btn-sm btn-icon" onclick="deleteWeightLog('${l.id}')">🗑</button>
    </div>`).join('');
}

function getUnifiedMainOneRm(oneRms = {}) {

    if (num > 0) return num;
  }
  return '';
}

function startFeedbackVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const status = document.getElementById('feedback-voice-status');
  const textarea = document.getElementById('session-trainer-feedback');
  if (!SpeechRecognition || !textarea) {
    if (status) status.textContent = '이 브라우저는 음성 기록을 지원하지 않습니다. 크롬/사파리 최신 버전을 사용하세요.';
    toast('음성 기록을 지원하지 않는 브라우저입니다', 'error');
    return;
  }
  if (feedbackRecognizing) return;
  feedbackRecognition = new SpeechRecognition();
  feedbackRecognition.lang = 'ko-KR';
  feedbackRecognition.continuous = true;
  feedbackRecognition.interimResults = true;
  let finalText = '';
  feedbackRecognition.onstart = () => {
    feedbackRecognizing = true;
    if (status) status.textContent = '듣는 중입니다. 중요한 피드백을 말하세요.';
  };
  feedbackRecognition.onresult = event => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript.trim();
      if (event.results[i].isFinal) finalText += `${transcript} `;
      else interim += `${transcript} `;
    }
    const base = textarea.dataset.voiceBase || textarea.value;
    textarea.value = `${base}${base && !base.endsWith('\n') ? '\n' : ''}${finalText}${interim}`.trim();
  };
  feedbackRecognition.onerror = e => {
    if (status) status.textContent = `음성 기록 오류: ${e.error || '알 수 없음'}`;
  };
  feedbackRecognition.onend = () => {
    feedbackRecognizing = false;
    textarea.dataset.voiceBase = textarea.value ? `${textarea.value.trim()}\n` : '';
    if (status) status.textContent = '음성 기록이 정지되었습니다. 저장 버튼을 눌러 피드백에 반영하세요.';
  };
  textarea.dataset.voiceBase = textarea.value ? `${textarea.value.trim()}\n` : '';
  feedbackRecognition.start();
}

function stopFeedbackVoice() {
  if (feedbackRecognition && feedbackRecognizing) feedbackRecognition.stop();
}

  { value: '좋음', emoji: '😊', label: '좋음' },

function getWeekStart(date) {
  const d = new Date(date + 'T00:00:00');
  d.setDate(d.getDate() - d.getDay() + 1); // 월요일 기준
  return d.toISOString().split('T')[0];
}

function renderPersonalLogs() {
  const el = document.getElementById('weekly-log-list');

  // 최근 12주 + 기록 있는 주 모두 포함
  const weeks = new Set();
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() - i * 7);
    weeks.add(getWeekStart(d.toISOString().split('T')[0]));
  }
  // 과거 기록이 있는 주도 추가
  DB.getMemberPersonalLogs(memberId).forEach(l => weeks.add(getWeekStart(l.date)));

  const sorted = [...weeks].sort((a, b) => b.localeCompare(a));

  el.innerHTML = sorted.map(ws => {
    const we = new Date(ws + 'T00:00:00');
    we.setDate(we.getDate() + 6);
    const wsDate = new Date(ws + 'T00:00:00');
    const label = `${wsDate.toLocaleDateString('ko-KR', {month:'long', day:'numeric'})} ~ ${we.toLocaleDateString('ko-KR', {month:'long', day:'numeric'})}`;
    const isCurrentWeek = ws === getWeekStart(today.toISOString().split('T')[0]);

    const checkin = DB.getWeeklyCheckin(memberId, ws);
    const logs = DB.getMemberPersonalLogs(memberId).filter(l => getWeekStart(l.date) === ws);

    const conditionBtns = CONDITION_OPTIONS.map(o => `
      <button onclick="setCondition('${ws}','${o.value}')"
        style="padding:6px 10px;border-radius:20px;border:1.5px solid ${checkin?.condition===o.value?'var(--primary)':'var(--border)'};background:${checkin?.condition===o.value?'var(--primary-light)':'#fff'};cursor:pointer;font-size:0.8rem;transition:all 0.12s">
        ${o.emoji} ${o.label}
      </button>`).join('');

    const logsHtml = logs.length ? logs.map(l => `
      <div style="background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-weight:700;font-size:0.88rem">${l.title||'개인 운동'} <span style="font-weight:400;color:var(--text-2);font-size:0.78rem">${new Date(l.date+'T00:00:00').toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'})}</span></span>
          <div style="display:flex;gap:4px">
            <button class="btn btn-ghost btn-sm btn-icon" onclick="editPersonalLog('${l.id}')">✏️</button>
            <button class="btn btn-red btn-sm btn-icon" onclick="deletePersonalLog('${l.id}')">🗑</button>
          </div>
        </div>
        ${(l.exercises||[]).length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">${(l.exercises||[]).map(e=>`<span style="font-size:0.75rem;background:var(--primary-light);color:var(--primary);padding:2px 7px;border-radius:10px">${e.name} ${e.sets}세트${e.weight?' · '+e.weight:''}</span>`).join('')}</div>`:''}
        ${l.note?`<div style="font-size:0.78rem;color:var(--text-2)">${l.note}</div>`:''}
      </div>`).join('') : '';

    return `
      <div class="card mb-3" style="${isCurrentWeek?'border:2px solid var(--primary)':''}">
        <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="toggleWeekCard('wk-${ws}')">
          <div>
            ${isCurrentWeek?'<span style="font-size:0.7rem;font-weight:700;color:var(--primary);background:var(--primary-light);padding:2px 7px;border-radius:10px;margin-right:6px">이번 주</span>':''}
            <span style="font-size:0.85rem;font-weight:700">${label}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${checkin?.condition?`<span style="font-size:0.85rem">${CONDITION_OPTIONS.find(o=>o.value===checkin.condition)?.emoji||''}</span>`:''}
            ${logs.length?`<span style="font-size:0.75rem;color:var(--primary);font-weight:600">${logs.length}개</span>`:''}
            <span id="wk-arrow-${ws}" style="color:var(--text-3);transition:transform 0.2s">${isCurrentWeek?'▲':'▼'}</span>
          </div>
        </div>
        <div id="wk-${ws}" style="padding:0 16px 14px;${isCurrentWeek?'':'display:none'}">

            <div style="font-size:0.78rem;font-weight:600;color:var(--text-2);margin-bottom:6px">이번 주 컨디션</div>

}

function closePersonalModal() {
  document.getElementById('modal-personal').classList.remove('active');
}

function editPersonalLog(id) {
  const log = DB.getPersonalLogs().find(l => l.id === id);
  if (log) openPersonalLogModal(log);
}

function deletePersonalLog(id) {
  if (!confirm('이 기록을 삭제하시겠습니까?')) return;
  DB.deletePersonalLog(id);
  renderPersonalLogs();
  toast('삭제되었습니다');
}

function savePersonalLog() {
  const date = document.getElementById('pl-date').value;
  if (!date) { toast('날짜를 선택하세요', 'error'); return; }
  const exercises = [...document.getElementById('pl-exercises').querySelectorAll('div[id^="pl-ex-"]')].map(row => {
    const inputs = row.querySelectorAll('input');
    return { name: inputs[0].value.trim(), sets: parseInt(inputs[1].value)||1, weight: inputs[2].value.trim() };
  }).filter(e => e.name);
  const data = { memberId, date, title: document.getElementById('pl-title').value.trim(), exercises, note: document.getElementById('pl-note').value.trim() };
  const editId = document.getElementById('pl-edit-id').value;
  if (editId) DB.updatePersonalLog(editId, data);
  else DB.addPersonalLog(data);
  closePersonalModal();
  renderPersonalLogs();
  toast('기록이 저장되었습니다', 'success');
}
</script>
</body>
</html>
